apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: goldilocks
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://charts.fairwinds.com/stable
      chart: goldilocks
      targetRevision: 7.1.0
      helm:
        valueFiles:
          - $values/applications/goldilocks/values.yaml
    - repoURL: https://github.com/krbck/gitops-config.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: goldilocks
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
