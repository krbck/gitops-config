apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mobile-api
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/krbck/gitops-config.git
    targetRevision: main
    path: helm-chart
    helm:
      valueFiles:
        - ../applications/mobile-api/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: production
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
