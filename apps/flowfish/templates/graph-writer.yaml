{{- if .Values.graphWriter.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: graph-writer
  labels:
    app: graph-writer
    component: writer
    tier: microservices
spec:
  replicas: {{ .Values.graphWriter.replicas }}
  selector:
    matchLabels:
      app: graph-writer
  template:
    metadata:
      labels:
        app: graph-writer
        component: writer
        tier: microservices
    spec:
      serviceAccountName: flowfish
      containers:
        - name: graph-writer
          image: "{{ .Values.graphWriter.image.repository }}:{{ .Values.graphWriter.image.tag }}"
          imagePullPolicy: {{ .Values.graphWriter.image.pullPolicy }}
          env:
            - name: SERVICE_NAME
              value: "graph-writer"
            - name: LOG_LEVEL
              value: {{ .Values.graphWriter.logLevel | quote }}
            - name: RABBITMQ_HOST
              value: "flowfish-rabbitmq"
            - name: RABBITMQ_PORT
              value: "5672"
            - name: RABBITMQ_USER
              valueFrom:
                secretKeyRef:
                  name: flowfish-secrets
                  key: rabbitmq-user
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: flowfish-secrets
                  key: rabbitmq-password
            - name: NEO4J_URI
              value: "bolt://neo4j:7687"
            - name: NEO4J_USER
              value: "neo4j"
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: flowfish-secrets
                  key: neo4j-password
          resources:
            {{- toYaml .Values.graphWriter.resources | nindent 12 }}
          livenessProbe:
            exec:
              command: ["python", "-c", "print('alive')"]
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            exec:
              command: ["python", "-c", "print('ready')"]
            initialDelaySeconds: 5
            periodSeconds: 10
{{- end }}
