{{- if .Values.clusterManager.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: flowfish-cluster-manager
  namespace: {{ .Values.namespace.name }}
  labels:
    app: cluster-manager
    {{- include "flowfish.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: flowfish-cluster-reader
  labels:
    app: cluster-manager
    {{- include "flowfish.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["nodes", "namespaces", "pods", "pods/log", "pods/exec", "services", "events", "configmaps"]
    verbs: ["get", "list", "watch", "create"]
  - apiGroups: ["apps"]
    resources: ["deployments", "daemonsets", "statefulsets", "replicasets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "networkpolicies"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["gadget.kinvolk.io"]
    resources: ["traces"]
    verbs: ["get", "list", "watch", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: flowfish-cluster-reader-binding
  labels:
    app: cluster-manager
    {{- include "flowfish.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: flowfish-cluster-reader
subjects:
  - kind: ServiceAccount
    name: flowfish-cluster-manager
    namespace: {{ .Values.namespace.name }}
---
apiVersion: v1
kind: Service
metadata:
  name: cluster-manager
  labels:
    app: cluster-manager
    {{- include "flowfish.labels" . | nindent 4 }}
spec:
  selector:
    app: cluster-manager
  ports:
    - name: grpc
      port: 5001
      targetPort: 5001
      protocol: TCP
      appProtocol: grpc
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cluster-manager
  labels:
    app: cluster-manager
    {{- include "flowfish.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cluster-manager
  template:
    metadata:
      labels:
        app: cluster-manager
    spec:
      serviceAccountName: flowfish-cluster-manager
      containers:
        - name: cluster-manager
          image: "{{ .Values.clusterManager.image.repository }}:{{ .Values.clusterManager.image.tag }}"
          imagePullPolicy: {{ .Values.clusterManager.image.pullPolicy }}
          ports:
            - name: grpc
              containerPort: 5001
              protocol: TCP
          env:
            - name: SERVICE_NAME
              value: "cluster-manager"
            - name: GRPC_PORT
              value: "5001"
            - name: LOG_LEVEL
              value: {{ .Values.clusterManager.logLevel | quote }}
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: flowfish-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: flowfish-secrets
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@{{ .Values.backend.database.postgresHost }}:5432/{{ .Values.backend.database.postgresDB }}"
            - name: REDIS_URL
              value: {{ .Values.backend.env.REDIS_URL | quote }}
            - name: IN_CLUSTER_CONFIG
              value: "true"
            {{- if .Values.clusterManager.encryptionKey }}
            - name: FLOWFISH_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: flowfish-secrets
                  key: FLOWFISH_ENCRYPTION_KEY
            {{- end }}
          resources:
            {{- toYaml .Values.clusterManager.resources | nindent 12 }}
          livenessProbe:
            exec:
              command:
                - python
                - -c
                - "import grpc; channel = grpc.insecure_channel('localhost:5001'); channel.close()"
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            exec:
              command:
                - python
                - -c
                - "import grpc; channel = grpc.insecure_channel('localhost:5001'); channel.close()"
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
{{- end }}
