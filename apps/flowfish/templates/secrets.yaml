{{- if .Values.secrets.create }}
---
apiVersion: v1
kind: Secret
metadata:
  name: flowfish-secrets
  labels:
    app: flowfish
    {{- include "flowfish.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $key, $value := .Values.secrets.data }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}
