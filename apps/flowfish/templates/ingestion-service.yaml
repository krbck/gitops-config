{{- if .Values.ingestionService.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: ingestion-service
  labels:
    app: ingestion-service
    {{- include "flowfish.labels" . | nindent 4 }}
spec:
  selector:
    app: ingestion-service
  ports:
    - name: grpc
      port: 5000
      targetPort: 5000
      protocol: TCP
      appProtocol: grpc
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingestion-service
  labels:
    app: ingestion-service
    {{- include "flowfish.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ingestion-service
  template:
    metadata:
      labels:
        app: ingestion-service
    spec:
      serviceAccountName: flowfish-backend
      containers:
        - name: ingestion-service
          image: "{{ .Values.ingestionService.image.repository }}:{{ .Values.ingestionService.image.tag }}"
          imagePullPolicy: {{ .Values.ingestionService.image.pullPolicy }}
          ports:
            - name: grpc
              containerPort: 5000
              protocol: TCP
          env:
            - name: SERVICE_NAME
              value: "ingestion-service"
            - name: GRPC_PORT
              value: "5000"
            - name: LOG_LEVEL
              value: {{ .Values.ingestionService.logLevel | quote }}
            - name: CLUSTER_MANAGER_URL
              value: "cluster-manager:5001"
            - name: GADGET_PROTOCOL
              value: "kubectl"
            - name: GADGET_NAMESPACE
              value: {{ .Values.namespace.name | quote }}
            {{- if .Values.clusterManager.encryptionKey }}
            - name: FLOWFISH_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: flowfish-secrets
                  key: FLOWFISH_ENCRYPTION_KEY
            {{- end }}
          resources:
            {{- toYaml .Values.ingestionService.resources | nindent 12 }}
          livenessProbe:
            exec:
              command:
                - python
                - -c
                - "import grpc; channel = grpc.insecure_channel('localhost:5000'); channel.close()"
            initialDelaySeconds: 30
            periodSeconds: 60
            timeoutSeconds: 10
          readinessProbe:
            exec:
              command:
                - python
                - -c
                - "import grpc; channel = grpc.insecure_channel('localhost:5000'); channel.close()"
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 10
{{- end }}
