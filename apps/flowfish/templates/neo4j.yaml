{{- if .Values.neo4j.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: flowfish-neo4j
  labels:
    app: flowfish-neo4j
    {{- include "flowfish.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 7474
      targetPort: 7474
      protocol: TCP
      name: http
    - port: 7687
      targetPort: 7687
      protocol: TCP
      name: bolt
  selector:
    app: flowfish-neo4j
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: flowfish-neo4j
  labels:
    app: flowfish-neo4j
    {{- include "flowfish.labels" . | nindent 4 }}
spec:
  serviceName: flowfish-neo4j
  replicas: 1
  selector:
    matchLabels:
      app: flowfish-neo4j
  template:
    metadata:
      labels:
        app: flowfish-neo4j
    spec:
      containers:
        - name: neo4j
          image: "{{ .Values.neo4j.image.repository }}:{{ .Values.neo4j.image.tag }}"
          imagePullPolicy: {{ .Values.neo4j.image.pullPolicy }}
          ports:
            - containerPort: 7474
              name: http
            - containerPort: 7687
              name: bolt
          env:
            - name: NEO4J_AUTH
              value: "neo4j/{{ .Values.neo4j.password }}"
            - name: NEO4J_server_memory_heap_initial__size
              value: {{ .Values.neo4j.memory.heapInitial | quote }}
            - name: NEO4J_server_memory_heap_max__size
              value: {{ .Values.neo4j.memory.heapMax | quote }}
            - name: NEO4J_server_memory_pagecache_size
              value: {{ .Values.neo4j.memory.pagecache | quote }}
            - name: NEO4J_server_default__listen__address
              value: "0.0.0.0"
            - name: NEO4J_ACCEPT_LICENSE_AGREEMENT
              value: "yes"
          resources:
            {{- toYaml .Values.neo4j.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          volumeMounts:
            - name: neo4j-data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: neo4j-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: {{ .Values.neo4j.persistence.storageClass | quote }}
        resources:
          requests:
            storage: {{ .Values.neo4j.persistence.size }}
{{- end }}
