{{- if .Values.timeseriesWriter.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: timeseries-writer
  labels:
    app: timeseries-writer
    component: writer
    tier: microservices
spec:
  replicas: {{ .Values.timeseriesWriter.replicas }}
  selector:
    matchLabels:
      app: timeseries-writer
  template:
    metadata:
      labels:
        app: timeseries-writer
        component: writer
        tier: microservices
    spec:
      serviceAccountName: flowfish
      containers:
        - name: timeseries-writer
          image: "{{ .Values.timeseriesWriter.image.repository }}:{{ .Values.timeseriesWriter.image.tag }}"
          imagePullPolicy: {{ .Values.timeseriesWriter.image.pullPolicy }}
          env:
            - name: SERVICE_NAME
              value: "timeseries-writer"
            - name: LOG_LEVEL
              value: {{ .Values.timeseriesWriter.logLevel | quote }}
            - name: RABBITMQ_HOST
              value: "flowfish-rabbitmq"
            - name: RABBITMQ_PORT
              value: "5672"
            - name: RABBITMQ_USER
              valueFrom:
                secretKeyRef:
                  name: flowfish-secrets
                  key: rabbitmq-user
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: flowfish-secrets
                  key: rabbitmq-password
            - name: CLICKHOUSE_HOST
              value: "clickhouse"
            - name: CLICKHOUSE_PORT
              value: "9000"
            - name: CLICKHOUSE_USER
              valueFrom:
                secretKeyRef:
                  name: flowfish-secrets
                  key: clickhouse-user
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: flowfish-secrets
                  key: clickhouse-password
            - name: CLICKHOUSE_DATABASE
              value: {{ .Values.clickhouse.database | quote }}
            - name: REDIS_HOST
              value: "redis"
            - name: REDIS_PORT
              value: "6379"
            - name: POSTGRES_HOST
              value: "flowfish-postgresql"
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_USER
              value: "flowfish"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: flowfish-secrets
                  key: postgres-password
            - name: POSTGRES_DATABASE
              value: "flowfish"
            - name: CHANGE_EVENTS_CONSUMER_ENABLED
              value: "true"
            - name: WORKLOAD_SYNC_ENABLED
              value: "true"
          resources:
            {{- toYaml .Values.timeseriesWriter.resources | nindent 12 }}
          livenessProbe:
            exec:
              command: ["python", "-c", "print('alive')"]
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            exec:
              command: ["python", "-c", "print('ready')"]
            initialDelaySeconds: 5
            periodSeconds: 10
{{- end }}
