{{- if .Values.analysisOrchestrator.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: analysis-orchestrator
  labels:
    app: analysis-orchestrator
    {{- include "flowfish.labels" . | nindent 4 }}
spec:
  selector:
    app: analysis-orchestrator
  ports:
    - name: grpc
      port: 5002
      targetPort: 5002
      protocol: TCP
      appProtocol: grpc
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: analysis-orchestrator
  labels:
    app: analysis-orchestrator
    {{- include "flowfish.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analysis-orchestrator
  template:
    metadata:
      labels:
        app: analysis-orchestrator
    spec:
      serviceAccountName: flowfish-backend
      containers:
        - name: analysis-orchestrator
          image: "{{ .Values.analysisOrchestrator.image.repository }}:{{ .Values.analysisOrchestrator.image.tag }}"
          imagePullPolicy: {{ .Values.analysisOrchestrator.image.pullPolicy }}
          ports:
            - name: grpc
              containerPort: 5002
              protocol: TCP
          env:
            - name: SERVICE_NAME
              value: "analysis-orchestrator"
            - name: GRPC_PORT
              value: "5002"
            - name: LOG_LEVEL
              value: {{ .Values.analysisOrchestrator.logLevel | quote }}
            - name: POSTGRES_HOST
              value: {{ .Values.backend.database.postgresHost | quote }}
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: flowfish-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: flowfish-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DATABASE
              value: {{ .Values.backend.database.postgresDB | quote }}
            - name: NEO4J_BOLT_URI
              value: {{ .Values.backend.env.NEO4J_BOLT_URI | quote }}
            - name: NEO4J_HTTP_URI
              value: {{ .Values.backend.env.NEO4J_HTTP_URI | quote }}
            - name: NEO4J_USER
              value: "neo4j"
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: flowfish-secrets
                  key: NEO4J_PASSWORD
            - name: NEO4J_DATABASE
              value: "neo4j"
            - name: CLICKHOUSE_HOST
              value: "clickhouse"
            - name: CLICKHOUSE_PORT
              value: "9000"
            - name: CLICKHOUSE_USER
              valueFrom:
                secretKeyRef:
                  name: flowfish-secrets
                  key: CLICKHOUSE_USER
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: flowfish-secrets
                  key: CLICKHOUSE_PASSWORD
            - name: CLICKHOUSE_DATABASE
              value: "flowfish"
            - name: CLUSTER_MANAGER_HOST
              value: "cluster-manager"
            - name: CLUSTER_MANAGER_PORT
              value: "5001"
          resources:
            {{- toYaml .Values.analysisOrchestrator.resources | nindent 12 }}
          livenessProbe:
            exec:
              command:
                - python
                - -c
                - "import grpc; channel = grpc.insecure_channel('localhost:5002'); channel.close()"
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            exec:
              command:
                - python
                - -c
                - "import grpc; channel = grpc.insecure_channel('localhost:5002'); channel.close()"
            initialDelaySeconds: 5
            periodSeconds: 10
{{- end }}
