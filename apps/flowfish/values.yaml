# =============================================================================
# Namespace
# =============================================================================
namespace:
  create: true
  name: flowfish

# =============================================================================
# Backend (FastAPI)
# =============================================================================
backend:
  replicaCount: 1

  image:
    repository: taylanbakircioglu/flowfish
    tag: "backend-latest"
    pullPolicy: Always

  service:
    type: ClusterIP
    port: 8000

  # Existing PostgreSQL & Redis in production namespace (cross-namespace DNS)
  database:
    postgresHost: postgres.production.svc.cluster.local
    postgresDB: flowfish

  env:
    REDIS_URL: "redis://redis-0.redis.production.svc.cluster.local:6379/0"
    CLICKHOUSE_URL: "http://clickhouse:8123"
    NEO4J_BOLT_URI: "bolt://flowfish-neo4j:7687"
    NEO4J_HTTP_URI: "http://flowfish-neo4j:7474"
    LOG_LEVEL: "INFO"
    CORS_ORIGINS: "http://flowfish-frontend:3000"
    JWT_EXPIRATION_HOURS: "1"
    ENABLE_LLM_ANALYSIS: "false"
    ENABLE_ANOMALY_DETECTION: "true"
    ENABLE_CHANGE_DETECTION: "true"
    ENV: "production"
    DEBUG: "false"

  # Reference existing secrets from production namespace if needed
  secretEnv: {}
  #   DB_USER:
  #     secretName: postgres-secret
  #     secretKey: POSTGRES_USER
  #   DB_PASSWORD:
  #     secretName: postgres-secret
  #     secretKey: POSTGRES_PASSWORD

  probes:
    liveness:
      enabled: true
      path: /api/v1/health
      initialDelaySeconds: 30
      periodSeconds: 15
      timeoutSeconds: 10
      failureThreshold: 5
    readiness:
      enabled: true
      path: /api/v1/health
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 5

  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi

# =============================================================================
# Frontend (React / Nginx)
# =============================================================================
frontend:
  replicaCount: 1

  image:
    repository: taylanbakircioglu/flowfish
    tag: "frontend-latest"
    pullPolicy: Always

  service:
    type: ClusterIP
    port: 3000

  env:
    REACT_APP_API_URL: "http://flowfish-backend:8000"
    REACT_APP_ENABLE_DARK_MODE: "true"
    REACT_APP_ENABLE_ANOMALY_DETECTION: "true"

  probes:
    liveness:
      enabled: true
      path: /
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 3
    readiness:
      enabled: true
      path: /
      initialDelaySeconds: 5
      periodSeconds: 5
      timeoutSeconds: 3
      failureThreshold: 3

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# =============================================================================
# Secrets
# =============================================================================
secrets:
  create: true
  data:
    POSTGRES_USER: appuser
    POSTGRES_PASSWORD: "apppass"  # <-- Set this to your actual appuser password from postgres-secret
    SECRET_KEY: "CHANGE_ME_SUPER_SECRET"
    NEO4J_PASSWORD: "CHANGE_ME"
    CLICKHOUSE_USER: flowfish
    CLICKHOUSE_PASSWORD: "CHANGE_ME"
    FLOWFISH_ENCRYPTION_KEY: "CHANGE_ME_ENCRYPTION_KEY"

# =============================================================================
# Cluster Manager (gRPC microservice)
# =============================================================================
clusterManager:
  enabled: true
  encryptionKey: true  # Set to false if FLOWFISH_ENCRYPTION_KEY not needed

  image:
    repository: taylanbakircioglu/flowfish
    tag: "cluster-manager-latest"
    pullPolicy: Always

  logLevel: "INFO"

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# =============================================================================
# Ingestion Service (gRPC microservice)
# =============================================================================
ingestionService:
  enabled: true

  image:
    repository: taylanbakircioglu/flowfish
    tag: "ingestion-service-latest"
    pullPolicy: Always

  logLevel: "INFO"

  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi

# =============================================================================
# Analysis Orchestrator (gRPC microservice)
# =============================================================================
analysisOrchestrator:
  enabled: true

  image:
    repository: taylanbakircioglu/flowfish
    tag: "analysis-orchestrator-latest"
    pullPolicy: Always

  logLevel: "INFO"

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# =============================================================================
# ClickHouse
# =============================================================================
clickhouse:
  enabled: true

  image:
    repository: clickhouse/clickhouse-server
    tag: "23-alpine"
    pullPolicy: IfNotPresent

  database: flowfish
  user: flowfish
  password: "CHANGE_ME"

  persistence:
    storageClass: local-path
    size: 10Gi

  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi

# =============================================================================
# Neo4j
# =============================================================================
neo4j:
  enabled: true

  image:
    repository: neo4j
    tag: "5.15-community"
    pullPolicy: IfNotPresent

  password: "CHANGE_ME"

  memory:
    heapInitial: "256m"
    heapMax: "512m"
    pagecache: "256m"

  persistence:
    storageClass: local-path
    size: 5Gi

  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

# =============================================================================
# VirtualService (Istio)
# =============================================================================
virtualService:
  enabled: true
  host: flowfish.krbck.site
  gateway: default/nginx-gateway
  backendPrefix: /api
  frontendPrefix: /
