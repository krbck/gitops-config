apiVersion: v1
kind: Service
metadata:
  name: {{ include "binance-ws-tracker.fullname" . }}
  labels:
    {{- include "binance-ws-tracker.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
      name: http
  selector:
    app: {{ .Release.Name }}
